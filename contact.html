<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un1fy | Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="_shared.css">
    <style>
        body { background: #faf9f6 !important; color: #1a1a1a !important; margin: 0; font-family: 'Inter', sans-serif; }
        .sub-nav { display: flex; align-items: center; justify-content: space-between; padding: 1.4rem 2rem; border-bottom: 1px solid rgba(0,0,0,0.06); background: rgba(250, 249, 246, 0.95); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 15px rgba(0,0,0,0.04); }
        .sub-nav .brand { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.4rem; color: #1a1a1a; text-decoration: none; }
        .sub-nav .brand span { color: var(--accent); }
        .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.55rem 1.2rem; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); border-radius: 100px; color: #1a1a1a; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: 0.25s; }
        .back-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; transform: translateX(-3px); }
        .page-wrap { max-width: 700px; margin: 0 auto; padding: 4rem 2rem 6rem; }
        .page-header { text-align: center; margin-bottom: 3rem; }
        .page-header h1 { font-family: 'Outfit', sans-serif; font-size: 2.8rem; font-weight: 800; margin-bottom: 0.5rem; position: relative; }
        .page-header h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .page-header h1:hover::after {
            opacity: 1;
        }
        .page-header p { color: #6b6b6b; }
        .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2.5rem; }
        .method-card { display: flex; align-items: center; gap: 1rem; background: #ffffff; border: 1px solid var(--border); padding: 1.3rem 1.5rem; border-radius: 16px; transition: 0.25s; cursor: default; box-shadow: 0 2px 12px var(--shadow); }
        .method-card:hover { border-color: var(--accent); background: rgba(201, 168, 124, 0.04); transform: translateY(-3px); box-shadow: 0 8px 25px var(--shadow-lg); }
        .method-card .icon { font-size: 1.6rem; }
        .method-card strong { display: block; font-size: 0.95rem; margin-bottom: 0.2rem; }
        .method-card small { color: #6b6b6b; font-size: 0.82rem; }
        .form-card { background: #ffffff; backdrop-filter: blur(30px); border: 1px solid rgba(0,0,0,0.08); border-radius: 22px; padding: 2.5rem; box-shadow: 0 4px 25px var(--shadow); }
        label { display: block; font-size: 0.78rem; font-weight: 600; color: #6b6b6b; margin-bottom: 0.4rem; letter-spacing: 0.04em; text-transform: uppercase; }
        input, textarea { width: 100%; background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.1); color: #1a1a1a; padding: 0.85rem 1.1rem; border-radius: 10px; font-size: 0.95rem; font-family: inherit; margin-bottom: 1.1rem; transition: 0.25s; box-sizing: border-box; resize: none; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(201, 168, 124, 0.05); box-shadow: 0 0 0 3px rgba(201, 168, 124, 0.12); }
        .submit-btn { width: 100%; padding: 1.1rem; background: var(--accent); color: #fff; font-family: inherit; font-size: 1rem; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; transition: 0.25s; box-shadow: 0 4px 20px rgba(201, 168, 124, 0.3); }
        .submit-btn:hover { background: #b8956a; color: #fff; transform: scale(1.02); box-shadow: 0 6px 25px rgba(201, 168, 124, 0.4); }
        .success-msg { display: none; text-align: center; padding: 2.5rem; background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.2); border-radius: 18px; }
        .success-msg .icon { font-size: 3rem; margin-bottom: 1rem; }
        @media (max-width: 580px) { .method-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="loading-logo">Un1fy</div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
    </div>

    <nav class="sub-nav">
        <a href="index.html" class="brand">Un1fy<span>.</span></a>
        <a href="index.html" class="back-btn">← Back home</a>
    </nav>
    <div class="page-wrap">
        <div class="page-header">
            <h1>📬 Contact</h1>
            <p>Reach out. We respond within 24 hours.</p>
        </div>

        <div class="method-grid">
            <div class="method-card">
                <span class="icon">📧</span>
                <div>
                    <strong>Email</strong>
                    <small>un1versxldev+un1fy@gmail.com</small>
                </div>
            </div>
            <div class="method-card">
                <span class="icon">💬</span>
                <div>
                    <strong>Live Chat</strong>
                    <small>Mon–Fri, 9am–5pm PST</small>
                </div>
            </div>
        </div>

        <div class="form-card">
            <form action="https://formsubmit.co/un1versxldev+un1fy@gmail.com" method="POST">
                <input type="hidden" name="_subject" value="New Un1fy Contact Inquiry">
                <input type="hidden" name="_next" value="https://un1versxls.github.io/uni1fy_website/index.html?success=contact">
                <input type="hidden" name="_template" value="table">
                
                <label>Name</label>
                <input type="text" name="name" placeholder="Your name" required>
                
                <label>Email</label>
                <input type="email" name="email" placeholder="you@email.com" required>
                
                <label>Subject</label>
                <input type="text" name="subject" placeholder="What's this about?" required>
                
                <label>Message</label>
                <textarea rows="5" name="message" placeholder="Tell us what's up..." required></textarea>
                
                <button type="submit" class="submit-btn" style="cursor:pointer;">Send Message 📨</button>
            </form>
        </div>
    </div>
    <footer style="padding:2.5rem 2rem; border-top:1px solid rgba(0,0,0,0.06); display:flex; justify-content:space-between; align-items:center; color:#888; font-size:0.8rem; max-width:700px; margin:0 auto;">
        <span>&copy; 2026 UN1FY</span>
        <a href="legal.html" style="color:#888;text-decoration:none;">Legal</a>
    </footer>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
            }, 2000);
        });
    </script>
</body>
</html>
