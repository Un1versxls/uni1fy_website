<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un1fy | Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="_shared.css">
    <style>
        body { background: #000 !important; color: #FFF !important; margin: 0; font-family: 'Inter', sans-serif; }
        .sub-nav { display: flex; align-items: center; justify-content: space-between; padding: 1.4rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.07); background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; }
        .sub-nav .brand { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.4rem; color: #FFF; text-decoration: none; }
        .sub-nav .brand span { color: var(--accent); }
        .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.55rem 1.2rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; color: #FFF; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: 0.25s; }
        .back-btn:hover { background: var(--accent); border-color: var(--accent); transform: translateX(-3px); }
        .page-wrap { max-width: 700px; margin: 0 auto; padding: 4rem 2rem 6rem; }
        .page-header { text-align: center; margin-bottom: 3rem; }
        .page-header h1 { font-family: 'Outfit', sans-serif; font-size: 2.8rem; font-weight: 800; margin-bottom: 0.5rem; }
        .page-header p { color: #888; }
        .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2.5rem; }
        .method-card { display: flex; align-items: center; gap: 1rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.09); padding: 1.3rem 1.5rem; border-radius: 16px; transition: 0.25s; cursor: default; }
        .method-card:hover { border-color: var(--accent); background: rgba(170,0,255,0.05); transform: translateY(-3px); }
        .method-card .icon { font-size: 1.6rem; }
        .method-card strong { display: block; font-size: 0.95rem; margin-bottom: 0.2rem; }
        .method-card small { color: #777; font-size: 0.82rem; }
        .form-card { background: rgba(14,14,14,0.95); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; padding: 2.5rem; }
        label { display: block; font-size: 0.78rem; font-weight: 600; color: #888; margin-bottom: 0.4rem; letter-spacing: 0.04em; text-transform: uppercase; }
        input, textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #FFF; padding: 0.85rem 1.1rem; border-radius: 10px; font-size: 0.95rem; font-family: inherit; margin-bottom: 1.1rem; transition: 0.25s; box-sizing: border-box; resize: none; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(170,0,255,0.06); box-shadow: 0 0 0 3px rgba(170,0,255,0.12); }
        .submit-btn { width: 100%; padding: 1.1rem; background: var(--accent); color: #FFF; font-family: inherit; font-size: 1rem; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; transition: 0.25s; box-shadow: 0 0 25px rgba(170,0,255,0.3); }
        .submit-btn:hover { background: #FFF; color: #000; transform: scale(1.02); }
        .success-msg { display: none; text-align: center; padding: 2.5rem; background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.2); border-radius: 18px; }
        .success-msg .icon { font-size: 3rem; margin-bottom: 1rem; }
        @media (max-width: 580px) { .method-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="sub-nav">
        <a href="index.html" class="brand">Un1fy<span>.</span></a>
        <a href="index.html" class="back-btn">← Back home</a>
    </nav>
    <div class="page-wrap">
        <div class="page-header">
            <h1>📬 Contact</h1>
            <p>Reach out. We respond within 24 hours.</p>
        </div>

        <div class="method-grid">
            <div class="method-card">
                <span class="icon">📧</span>
                <div>
                    <strong>Email</strong>
                    <small>un1versxldev+un1fy@gmail.com</small>
                </div>
            </div>
            <div class="method-card">
                <span class="icon">💬</span>
                <div>
                    <strong>Live Chat</strong>
                    <small>Mon–Fri, 9am–5pm PST</small>
                </div>
            </div>
        </div>

        <div class="form-card">
            <form id="contact-form" onsubmit="sendMessage(event)">
                <label>Name</label>
                <input type="text" id="contact-name" placeholder="Your name" required>
                <label>Email</label>
                <input type="email" id="contact-email" placeholder="you@email.com" required>
                <label>Subject</label>
                <input type="text" id="contact-subject" placeholder="What's this about?" required>
                <label>Message</label>
                <textarea rows="5" id="contact-message" placeholder="Tell us what's up..." required></textarea>
                <button type="submit" class="submit-btn" id="contact-btn">Send Message 📨</button>
            </form>
            <div class="success-msg" id="success-msg">
                <div class="icon">✅</div>
                <h3>Message sent!</h3>
                <p style="color:#888;margin-top:0.5rem;">We'll get back to you within 24 hours.</p>
            </div>
            <div class="success-msg" id="error-msg" style="background: rgba(239, 68, 68, 0.06); border-color: rgba(239, 68, 68, 0.2);">
                <div class="icon">❌</div>
                <h3>Failed to send</h3>
                <p style="color:#888;margin-top:0.5rem;">Please check your connection and try again.</p>
            </div>
        </div>
    </div>
    <script>
        function sendMessage(e) {
            e.preventDefault();
            const btn = document.getElementById('contact-btn');
            const name = document.getElementById('contact-name').value;
            const email = document.getElementById('contact-email').value;
            const sub = document.getElementById('contact-subject').value;
            const msg = document.getElementById('contact-message').value;
            
            btn.textContent = '⏳ Redirecting...';
            btn.disabled = true;

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://formsubmit.co/un1versxldev+un1fy@gmail.com';
            
            const subj = document.createElement('input'); subj.type = 'hidden'; subj.name = '_subject'; subj.value = `Un1fy Contact: ${sub}`; form.appendChild(subj);
            const nme = document.createElement('input'); nme.type = 'hidden'; nme.name = 'name'; nme.value = name; form.appendChild(nme);
            const eml = document.createElement('input'); eml.type = 'hidden'; eml.name = 'email'; eml.value = email; form.appendChild(eml);
            const msge = document.createElement('input'); msge.type = 'hidden'; msge.name = 'message'; msge.value = msg; form.appendChild(msge);
            
            document.body.appendChild(form);
            form.submit();
        }
    </script>
    <footer style="padding:2.5rem 2rem; border-top:1px solid rgba(255,255,255,0.06); display:flex; justify-content:space-between; align-items:center; color:#555; font-size:0.8rem; max-width:700px; margin:0 auto;">
        <span>&copy; 2026 UN1FY</span>
        <a href="legal.html" style="color:#555;text-decoration:none;">Legal</a>
    </footer>
    <script>
        function sendMessage(e) {
            e.preventDefault();
            document.getElementById('contact-form').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
        }
    </script>
</body>
</html>
